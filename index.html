<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
<link rel="icon" type="image/png" href="/favicon.png" />
     <link rel="apple-touch-icon" href="/favicon.png">
     <meta name="viewport" content="width=device-width, initial-scale=1.0" />
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
     <title>ENIGMO LABS | The Future is Engineered</title>
  </head>
  <body>
    <div id="root"></div>

    <!-- Hidden Netlify Form for form detection -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <select name="protocol">
        <option value="Foundations">Foundations</option>
        <option value="Intelligence">Intelligence</option>
        <option value="Enigma">Enigma</option>
        <option value="Bespoke">Bespoke</option>
      </select>
      <textarea name="brief"></textarea>
    </form>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
